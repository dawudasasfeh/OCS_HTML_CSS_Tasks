<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task3B</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <header class="header">
        <h2 class="header__title">BrightWeb</h2>
        <nav class="header__nav">
            <i class="fa-solid fa-bars nav__icon" aria-hidden="true"></i>
            <div class="header__links">
                <a class="header__link" href="#">Shop</a>
                <a class="header__link" href="#">Original Content</a>
                <a class="header__link" href="#">Gift</a>
                <a class="header__link" href="#">Account</a>
                <i class="fa-solid fa-cart-shopping"></i>
            </div>

        </nav>
    </header>

    <main class="main">
        <div class="contact-us">
            <div>
                <h1 class="contact-us__title">Contact US</h1>
                <p class="contact-us__p">Questions not answered yet? We are here to help</p>
            </div>
            <div>
                <form class="field" action="#" method="GET">
                    <label for="q">HOW CAN WE HELP YOU TODAY?</label>
                    <input type="text" name="q" id="q">
                </form>
            </div>
            <p>Partnership and Media inquiries</p>
        </div>
    </main>

    <footer class="footer">
            <p class="footer__txt">Questions not answered?</p>
            <p>Contact us</p>
    </footer>
</body>
</html>
