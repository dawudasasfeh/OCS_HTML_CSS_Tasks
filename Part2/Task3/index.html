<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Task2</title>
</head>
<body>
    <div class="logo"></div>
    <main class="container">
        <div class="card">
            <h2 class="card__title">Sign Up</h2>
            <p class="card__txt">Please fill in this form to create an</p>
            <hr>
            <div class="inputs">
                <div class="name">
                    <input type="text" name="first" id="fname" placeholder="First Name">
                    <input type="text" name="last" id="lname" placeholder="Last Name">
                </div>
                <div class="email">
                    <input type="text" name="email" id="email" placeholder="Email">
                </div>
                <div class="password-show">
                    <input type="password" name="pass" id="pass" placeholder="Password">
                    <input type="password" name="pass" id="pass" placeholder="Confirm Password">
                </div>
            </div>
            <div class="check">
                <input type="checkbox">
                <p>I accept the <span class="blue">Terms of Use</span> & <span class="blue">Privacy Policy</span></p>
            </div>


            <div class="buttons">
                <button>Sign Up</button>
            
        </div>
    </main>
    <p class="new">Alread have account? <a href="#">Login here</a></p>
</body>
</html>
