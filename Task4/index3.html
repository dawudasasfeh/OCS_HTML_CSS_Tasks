<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task4C</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>
    <main class="container">
        <div class="card">
            <h2 id="card__title">Contact Us</h2>
                <form class="card__inputs" action="#" method="POST">
                    <input type="text" name="name" id="name" placeholder="Full Name">
                    <input type="email" name="email" id="email" placeholder="Email">
                    <input type="number" name="pass" id="pass" placeholder="Tel: XXX XXX XXXX">
                    <textarea name="msg" id="msg" rows="10">Your Message Here...</textarea>
                </form>
            <button class="card__btn">Send</button>
        </div>
    </main>
</body>
</html>
