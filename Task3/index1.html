<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style1.css">
    <title>Task3A</title>
</head>
<body>
    <div class="logo"></div>
    <main class="container">
        <div class="card">
            <h2 class="card__title">Sign Up</h2>

            <div class="inputs">
                <div class="name">
                    <input type="text" name="first" id="fname" placeholder="First Name">
                    <input type="text" name="last" id="lname" placeholder="Last Name">
                </div>
                <div class="email">
                    <input type="text" name="email" id="email" placeholder="Email">
                </div>
                <div class="password-show">
                    <input type="password" name="pass" id="pass" placeholder="Password">
                    <input type="password" name="pass" id="pass" placeholder="Confirm Password">
                </div>
            </div>
            <div class="check">
                <input type="checkbox">
                <p>I accept the Terms of Use & Privacy Policy</p>
            </div>


            <div class="buttons">
                <button>Sign Up</button>
            </div>
            <div class="end">
                <p class="new">Alread have account? <a href="#">Login here</a></p>
                <p class="new">Copyright &copy; silsila.com</p>
            </div>
        </div>
    </main>
</body>
</html>
