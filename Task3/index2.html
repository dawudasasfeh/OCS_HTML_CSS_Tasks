<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style2.css">
    <title>Task3B</title>
</head>
<body>
    <div class  ="logo"></div>
    <main class="container">
        <div class="card">
            <div class="card__1">
                <img src="assets/image.png" alt="this is a computer image">
            </div>
            <div class="card__2">
                <h2 class="card__title">Member Login</h2>

                <div class="inputs">
                    <div class="email">
                        <input type="text" name="email" id="email" placeholder="Email">
                    </div>
                    <div class="password-show">
                        <input type="password" name="pass" id="pass" placeholder="Password">
                </div>


                <div class="buttons">
                    <button>Login</button>
                </div>
                <div class="end">
                    <p class="new">Forget <a href="#">Username / Password?</a></p>
                    <p class="new"><a href="">Create your account</a></p>
            </div>
            </div>
        </div>
    </main>
</body>
</html>
