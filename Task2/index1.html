<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style1.css">
    <title>Task2A</title>
</head>
<body>
    <div class="logo"></div>
    <main class="container">
        <div class="card">
            <h2 class="card__title">Sign In</h2>
            <p id="card__p">Stay updated on your professional world</p>

            <div class="inputs">
                <div class="email">
                <input type="text" name="email" id="email" placeholder="Email or Phone">
                </div>
                <div class="password-show">
                <input type="password" name="pass" id="pass" placeholder="Password">
                <button class="show-btn">Show</button>
                </div>
            </div>
            <button class="fp-btn">Forget password?</button>

            <div class="buttons">
                <button>Sign in</button>
                <p class="line-txt">or</p>
                <button>Sign in with Apple</button>
            </div>
        </div>
        <p class="new">New to linkedIn? <strong>Join now</strong></p>
    </main>
</body>
</html>
