<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style3.css">
    <title>Task2C</title>
</head>
<body>
    <div class="logo"></div>
    <main class="container">
        <div class="card">
            <h2 class="card__title">Login</h2>

            <div class="inputs">
                <div class="email">
                    <input type="text" name="email" id="email" placeholder="Email">
                </div>
                <div class="password-show">
                    <input type="password" name="pass" id="pass" placeholder="Password">
                    <div>
                        <input type="checkbox">
                        <button class="fp-btn">Show Password</button>
                    </div>
                </div>
            </div>


            <div class="buttons">
                <button>Sign in</button>
            </div>
            <div class="end">
                <p class="new">Forget? <strong>Username / Password</strong>?</p>
                <p class="new">Dont have an account? <strong>Sign up</strong></p>
            </div>
        </div>
    </main>
</body>
</html>
